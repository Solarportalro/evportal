services:
  postgres:
    image: postgres:16
    container_name: evportal-postgres
    environment:
      POSTGRES_USER: evportal
      POSTGRES_PASSWORD: evportal_dev_password
      POSTGRES_DB: evportal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
